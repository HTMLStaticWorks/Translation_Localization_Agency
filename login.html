<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lingua</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2E86C1',     /* Cyber Blue */
                        secondary: '#0B1F3A',   /* Dark Navy */
                        accent: '#3df9c6',      /* Neon Green */
                        bgLight: '#F7FAFC',
                        bgDark: '#071521',
                        cardDark: '#0F2A3D',
                        textDark: '#EAF4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        .dark body {
            background: radial-gradient(circle at top right, rgba(46, 134, 193, 0.1), transparent),
                radial-gradient(circle at bottom left, rgba(61, 249, 198, 0.05), transparent);
            background-color: #0B1F3A;
        }

        .login-card {
            background: rgba(15, 42, 61, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-btn:hover {
            background: rgba(61, 249, 198, 0.1);
            border-color: #3df9c6;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="bg-white dark:bg-secondary text-secondary dark:text-white overflow-x-hidden min-h-screen flex flex-col">

    <!-- Theme Toggle Floating -->
    <div class="fixed top-6 right-6 md:top-10 md:right-10 z-50">
        <button id="theme-toggle"
            class="theme-toggle-btn w-12 h-12 bg-gray-100 dark:bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-gray-200 dark:border-white/10 text-secondary dark:text-white hover:bg-gray-200 dark:hover:bg-white/20 transition-all"
            aria-label="Toggle Theme">
            <span id="theme-toggle-icon"></span>
        </button>
    </div>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        <!-- Auth Container -->
        <div class="w-full max-w-[480px] z-10 py-20">

            <!-- Brand Header -->
            <div class="text-center mb-10">
                <a href="index.html"
                    class="brand-logo inline-flex items-center gap-2 group mb-10 text-secondary dark:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 transition-transform group-hover:rotate-12"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span
                        class="text-xl font-bold font-heading text-black dark:text-textDark tracking-tight">Lingua</span>
                </a>
                <h1 class="text-3xl font-bold text-secondary dark:text-white mb-2">Welcome Back</h1>
                <p class="text-gray-400">Secure access to your global translation hub.</p>
            </div>

            <!-- Main Card -->
            <div
                class="login-card p-10 md:p-12 rounded-[2.5rem] shadow-2xl bg-white/80 dark:bg-cardDark/70 backdrop-blur-xl border border-gray-100 dark:border-white/10">
                <form action="dashboard.html" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Professional
                            Email</label>
                        <div class="relative">
                            <input type="email" required placeholder="name@company.com"
                                class="w-full bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-primary text-secondary dark:text-white transition-all placeholder:text-gray-500">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label
                                class="block text-sm font-bold text-gray-400 uppercase tracking-widest">Password</label>
                            <a href="index.html"
                                class="text-xs font-bold text-primary hover:text-accent dark:text-primary dark:hover:text-accent transition-colors hover:underline">Forgot
                                Password?</a>
                        </div>
                        <div class="relative">
                            <input type="password" required placeholder="••••••••"
                                class="w-full bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-primary text-secondary dark:text-white transition-all placeholder:text-gray-500">
                        </div>
                    </div>

                    <div class="flex items-center gap-3 py-2">
                        <input type="checkbox" id="remember"
                            class="w-5 h-5 accent-accent bg-transparent border-white/20 rounded">
                        <label for="remember" class="text-sm text-gray-400 cursor-pointer">Stay signed in for 30
                            days</label>
                    </div>

                    <button type="submit"
                        class="w-full btn-premium btn-accent py-4 text-primary font-bold shadow-lg shadow-accent/10">
                        Login to Dashboard
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-10">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-100 dark:border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-widest">
                        <span class="bg-white dark:bg-cardDark px-4 text-gray-500 font-medium">Or continue with</span>
                    </div>
                </div>

                <!-- Social Logins -->
                <div class="grid grid-cols-3 gap-4">
                    <button
                        class="social-btn flex items-center justify-center py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl">
                        <svg class="w-5 h-5 fill-current text-secondary dark:text-white" viewBox="0 0 24 24">
                            <path
                                d="M12.48 10.92v3.28h7.84c-.24 1.84-.909 3.159-1.908 4.053-1.097 1.092-2.519 1.874-4.646 1.874-4.82 0-8.597-3.891-8.597-8.707s3.777-8.707 8.597-8.707c2.607 0 4.545.998 5.923 2.296l2.307-2.307C21.734 1.259 18.784 0 14.116 0 6.444 0 0 6.444 0 14.116s6.444 14.116 14.116 14.116c4.137 0 7.258-1.353 9.65-3.84 2.47-2.468 3.243-5.91 3.243-8.66 0-.825-.067-1.613-.193-2.348H12.48z" />
                        </svg>
                    </button>
                    <button
                        class="social-btn flex items-center justify-center py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl">
                        <svg class="w-5 h-5 fill-current text-secondary dark:text-white" viewBox="0 0 24 24">
                            <path
                                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                        </svg>
                    </button>
                    <button
                        class="social-btn flex items-center justify-center py-4 bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-2xl">
                        <svg class="w-5 h-5 fill-current text-secondary dark:text-white" viewBox="0 0 24 24">
                            <path
                                d="M0 0h11.4v11.4h-11.4v-11.4zm12.6 0h11.4v11.4h-11.4v-11.4zm-12.6 12.6h11.4v11.4h-11.4v-11.4zm12.6 0h11.4v11.4h-11.4v-11.4z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Footer Link -->
            <p class="text-center mt-10 text-gray-500">
                Don't have an account? <a href="register.html"
                    class="text-secondary dark:text-white font-bold hover:text-accent dark:hover:text-accent transition-colors underline decoration-transparent hover:decoration-accent decoration-2 underline-offset-4">Create
                    Enterprise Account</a>
            </p>
        </div>
    </main>


    <script src="assets/js/main.js"></script>
</body>

</html>
